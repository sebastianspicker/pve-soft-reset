name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats jq

      - name: Bash syntax check
        run: bash -n pve-soft-reset.sh lib/*.bash

      - name: ShellCheck
        run: shellcheck -x pve-soft-reset.sh lib/*.bash

      - name: Docs link check
        run: ./scripts/check-doc-links.sh

      - name: Bats
        run: bats tests
